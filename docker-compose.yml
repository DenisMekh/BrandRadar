# Full-stack BrandRadar — all services in one command
services:
  # ── Backend (Go) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brandradar-backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=dev
      - APP_PORT=8080
      - APP_LOG_LEVEL=debug
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DATABASE=app_db
      - POSTGRES_SSL_MODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ML_SENTIMENT_HOST=http://ml:8000
    networks:
      - brandradar
    restart: unless-stopped

  # ── Frontend (React + Vite) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: brandradar-frontend
    ports:
      - "8081:8081"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - brandradar
    restart: unless-stopped

  # ── ML Service (Python / FastAPI) ──
  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: brandradar-ml
    ports:
      - "8000:8000"
    depends_on:
      - s3
    environment:
      - S3_ENDPOINT_URL=http://s3:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_REGION_NAME=us-east-1
    networks:
      - brandradar
    restart: unless-stopped

  # ── Infrastructure ──
  postgres:
    image: postgres:16-alpine
    container_name: brandradar-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - brandradar

  redis:
    image: redis:7-alpine
    container_name: brandradar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - brandradar

  s3:
    image: minio/minio
    container_name: brandradar-s3
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - s3_data:/data
    networks:
      - brandradar

  # ── Monitoring ──
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: brandradar-prometheus
    ports:
      - "8082:9090"
    volumes:
      - ./backend/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    depends_on:
      - backend
    networks:
      - brandradar
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: brandradar-grafana
    ports:
      - "8083:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./backend/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./backend/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - brandradar
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  s3_data:
  prometheus_data:
  grafana_data:

networks:
  brandradar:
    driver: bridge
